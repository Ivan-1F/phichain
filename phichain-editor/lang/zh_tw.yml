        selected: 選擇的曲線音符軌跡
      start: 從這裡開始新增曲線音符軌跡
      removed:
        incomplete: 一條曲線音符軌跡被移除：缺少起點或終點
        invalid: 一條曲線音符軌跡被移除：起點或終點無效
        empty: 一條曲線音符軌跡被移除：沒有包含任何音符

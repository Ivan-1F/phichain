      state: 狀態
      preview: 預覽
    preview:
      position: 位置
      opacity: 透明度
    create_line: 新增判定線
    note: 音符
    event: 事件
    position: 位置
    rotation: 旋轉
    opacity: 透明
    speed: 速度
    index: 編號
    remove: 移除

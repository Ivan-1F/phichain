    title: BPM 列表
    new: 新增 BPM 點
    zero_beat_not_editable: 每個專案中必須存在一個拍數為 0 的 BPM 點
    point:
      beat: 時間（拍）
      bpm: BPM
  settings:
    title: 設定
    category:
      general:
        title: 常規
        description: 編輯器常規設定
        timeline_scroll_sensitivity:
          label: 時間線滾動靈敏度
          description: 使用滑鼠滾輪或觸控板滾動時間線時的靈敏度。數值越大滾動越快
        timeline_smooth_seeking:
          label: 時間線平滑尋位
          description: 啟用後，使用滾動、前進/後退快捷鍵等，使時間線平滑捲動
        highlight_selected_line:
          label: 高亮選擇判定線
          description: 是否高亮選擇的判定線
        show_line_anchor:
          label: 顯示判定線錨點
          description: 以什麼規則顯示判定線的錨點
          never: 從不
          always: 總是
          visible: 僅可見判定線
        pause_when_scroll:
          label: 滾動時暫停
          description: 在滾動時間線時暫停編輯器
        send_telemetry:
          label: 發送遙測
          description: 是否發送遙測資料。了解更多關於遙測的資訊，請查看 https://phicha.in/telemetry
          disabled_by_env_var: 遙測被環境變數禁用
          debug_enabled: 已啟用遙測除錯
        language:
          label: 語言
          description: 編輯器使用的語言
      graphics:
        title: 影像
        description: 影像和顯示設定
        ui_scale:
          label: 介面縮放
          description: 調整整體介面大小。可能需要調整視窗大小才能生效
          xl: 超大
          large: 大
          base: 標準
          small: 小
          xs: 超小
        vsync:
          label: 垂直同步
          description: 啟用垂直同步以符合顯示器更新率
      audio:
        title: 音樂
        description: 編輯器的音樂設定
        music_volume:
          label: 音樂音量
          description: 音樂的音量
        hit_sound_volume:
          label: 打擊音效音量
          description: 打擊音效的音量
        metronome_volume:
          label: 節拍器音量
          description: 節拍器的音量
        metronome_enabled:
          label: 節拍器
          description: 播放時啟用節拍器
        playback_rate:
          label: 播放速率
          description: 控制音樂的播放速率，這將影響編輯器的全域速度
      game:
        title: 遊戲
        description: 遊戲預覽設定，自訂預覽畫面的視覺效果
        fc_ap_indicator:
          label: FC/AP 指示器
          description: 是否啟用 FC/AP 指示器。編輯器不含判定，即勾選後判定線恆定為黃色，不勾選則恆定為白色
        hide_hit_effect:
          label: 隱藏打擊特效
          description: 是否隱藏打擊特效
        note_scale:
          label: 音符縮放
          description: 音符的縮放比例
        multi_highlight:
          label: 多押高亮
          description: 是否開啟多押高亮，即高亮所有同時音符
        hit_effect_follow_game_time:
          label: 打擊特效使用遊戲時間（除錯）
          description: 打擊特效是否跟隨遊戲時間。啟用後，打擊特效的渲染將不再基於遊戲全域時間，而是基於譜面時間。僅在除錯環境中存在
      respack:
        title: 資源包
        description: 切換目前使用的資源包，或重新載入目前資源包。外部資源包從 respacks 目錄中讀取。
        no_description: 無簡介
        open_folder:
          label: 資源包資料夾
          button: 開啟
        reload:
          label: 重新載入
          description: 從磁碟重新讀取目前資源包。在編輯資源包時無需重啟編輯器即可預覽改動。
          button: 重新載入
      autosave:
        title: 自動儲存
        description: 定期自動備份譜面檔案以防止修改遺失。自動儲存會在 .autosave 資料夾中新增備份檔案，不會覆蓋專案檔案（chart.json）
        enabled: 啟用自動儲存
        interval:
          label: 自動儲存間隔
          description: 當有未儲存更改時自動儲存專案的頻率
          suffix: " 秒"
        idle_delay:
          label: 空閒儲存延時
          description: 停止編輯後等待多長時間再自動儲存
          suffix: " 秒"
        max_backups:
          label: 最大備份檔案數
          description: 在 .autosave 資料夾中保留的自動儲存備份檔案的最大數量
          suffix: " 個檔案"
      hotkey:
        title: 快捷鍵
        description: 編輯器的鍵盤快捷鍵和按鍵綁定
        record: 錄製
        recording: 正在錄製
        cancel: 取消
        reset: 重設


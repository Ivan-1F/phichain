[package]
name = "phichain-assets"
version = "1.0.0-beta.6"
edition = "2021"

[dependencies]
bevy = { workspace = true }
bevy_kira_audio = { version = "0.23.0", features = [
    "mp3",
    "ogg",
    "flac",
    "wav",
] }
bevy_asset_loader = "0.23.0-rc.4"
bevy_egui = { version = "0.35.1", optional = true }

[features]
egui = ["dep:bevy_egui"]

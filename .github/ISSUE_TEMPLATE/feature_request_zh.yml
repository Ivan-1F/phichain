name: 功能请求
description: 为这个项目提出一个想法或建议
labels: []
body:
  - type: textarea
    id: motivation
    attributes:
      label: 动机
      description: 你为什么需要这个功能？你想解决什么问题？这个功能如何帮助你？
      placeholder: 描述一下你想要的功能！
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 请尽可能详细地描述你想要的功能
    validations:
      required: true

  - type: textarea
    id: other-information
    attributes:
      label: 其他信息
      description: 其他有用的信息。如果没有，请留空。
